# One-shot remedy for #11 (the checksuite-guard red): GitHub auto-creates an empty, perpetually
# "queued" check suite for the Railway integration app (app_id 73253, slug railway-app) on our OWN
# repo. checksuite-guard.yml correctly flags it. The documented fix (see that file's header) is to
# disable auto_trigger_checks for that app via the check-suites/preferences API.
#
# This is purely defensive housekeeping on our own repository's CI noise. It needs a token with
# `checks: write`; rather than mint a personal token, this workflow uses the built-in GITHUB_TOKEN
# elevated to checks:write for this job only. Runs automatically when this file is pushed, and is
# re-runnable any time via the Actions "Run workflow" button if railway-app ever re-enables.
# (re-run 2026-06-17 after the repo workflow-token permission was raised to read/write.)
name: disable-railway-checks
on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/disable-railway-checks.yml"

permissions:
  checks: write
  contents: read

jobs:
  disable:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Disable auto_trigger_checks for railway-app (app_id 73253) and verify setting:false
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          resp=$(curl -sf -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/check-suites/preferences" \
            -d '{"auto_trigger_checks":[{"app_id":73253,"setting":false}]}')
          echo "$resp" | jq '.preferences.auto_trigger_checks'
          # A bare 200 can be a silent no-op — assert the railway-app entry is actually setting:false.
          echo "$resp" | jq -e '.preferences.auto_trigger_checks[] | select(.app_id==73253) | .setting==false' >/dev/null \
            && echo "OK — railway-app (73253) auto_trigger_checks is now setting:false" \
            || { echo "::error::railway-app setting not false in response"; exit 1; }
