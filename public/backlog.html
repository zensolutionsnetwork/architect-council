<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Backlog</title>
<style>
  :root { --bg:#0f1115; --card:#171a21; --ink:#e8e6e1; --dim:#9a968d; --acc:#caa46a; --ok:#7fb069; --err:#d06c5b; --line:#262a33; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.55 "Segoe UI",system-ui,sans-serif; }
  header { display:flex; align-items:center; gap:12px; padding:16px 26px; border-bottom:1px solid var(--line); }
  header h1 { font-size:17px; margin:0; font-weight:600; letter-spacing:.4px; }
  header .sub { color:var(--dim); font-size:13px; }
  header .right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  main { max-width:980px; margin:0 auto; padding:24px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px 20px; margin-bottom:16px; }
  .row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  button { background:var(--acc); color:#14110a; border:0; border-radius:8px; padding:8px 15px; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; color:var(--acc); border:1px solid var(--acc); }
  input[type=password] { background:#0d0f13; border:1px solid #2c313c; border-radius:8px; color:var(--ink); padding:8px 12px; min-width:260px; }
  .meta { color:var(--dim); font-size:12.5px; }
  .msg.err { color:var(--err); font-size:13px; }
  .actor { font-weight:600; font-size:15px; letter-spacing:.3px; }
  .badge { font-size:11.5px; color:var(--dim); border:1px solid var(--line); border-radius:6px; padding:2px 8px; }
  ul { margin:8px 0 2px; padding-left:20px; }
  li { margin:3px 0; }
  li.done { color:var(--dim); }
  li.done::marker { content:"✓ "; color:var(--ok); }
  li.plan::marker { content:"› "; color:var(--acc); }
  .grouph { font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin-top:10px; }
  pre.raw { white-space:pre-wrap; font:13px/1.6 Consolas,monospace; color:var(--ink); margin:8px 0 0; }
  #board, #signedbar { display:none; }
  .hint { color:var(--dim); font-size:13px; margin-top:8px; line-height:1.6; }
  a { color:var(--acc); }
</style>
</head>
<body>
<header>
  <h1>🏛️ Council backlog</h1>
  <span class="sub">live · per-agent</span>
  <span class="right">
    <span class="meta" id="refreshed"></span>
    <span id="signedbar"><button class="ghost" onclick="signOut()">Sign out</button></span>
  </span>
</header>
<main>
  <div class="card" id="auth">
    <div class="row">
      <div id="gsi"></div>
      <input type="password" id="tok" placeholder="...or console key">
      <button onclick="useToken()">Enter</button>
    </div>
    <div class="hint" id="authhint">Sign in with the owner Google account, or paste the console key.</div>
    <div class="msg err" id="autherr"></div>
  </div>
  <div id="board"></div>
</main>
<script>
let auth = null; // { kind:'google'|'token', value }
let timer = null;

function hdrs() {
  if (!auth) return {};
  return auth.kind === 'google' ? { 'x-google-id-token': auth.value } : { 'x-admin-token': auth.value };
}
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function renderList(items, cls) {
  if (!items || !items.length) return '<div class="meta">none</div>';
  return '<ul>' + items.map(i => '<li class="' + cls + '">' + esc(typeof i === 'string' ? i : JSON.stringify(i)) + '</li>').join('') + '</ul>';
}

async function load() {
  try {
    const r = await fetch('/api/council/backlog', { headers: hdrs() });
    if (r.status === 401) { return showAuth('Session expired or not authorized - sign in again.'); }
    if (!r.ok) { return showAuth('Hub returned ' + r.status); }
    const d = await r.json();
    const sections = d.sections || [];
    const board = document.getElementById('board');
    if (!sections.length) { board.innerHTML = '<div class="card meta">no backlog rows yet</div>'; }
    else {
      board.innerHTML = sections.map(s => {
        const when = s.updatedAt ? new Date(s.updatedAt).toLocaleString() : '';
        let body;
        if ((s.done && s.done.length) || (s.planned && s.planned.length)) {
          body = '<div class="grouph">planned</div>' + renderList(s.planned, 'plan')
               + '<div class="grouph">done</div>' + renderList(s.done, 'done');
        } else if (s.content) {
          body = '<pre class="raw">' + esc(s.content) + '</pre>';
        } else { body = '<div class="meta">empty</div>'; }
        return '<div class="card"><div class="row" style="justify-content:space-between">'
             + '<span class="actor">' + esc(s.actor || 'unknown') + '</span>'
             + '<span class="badge">' + esc(when) + '</span></div>' + body + '</div>';
      }).join('');
    }
    document.getElementById('auth').style.display = 'none';
    document.getElementById('signedbar').style.display = 'inline';
    board.style.display = 'block';
    document.getElementById('refreshed').textContent = 'refreshed ' + new Date().toLocaleTimeString();
    if (!timer) timer = setInterval(load, 60000);
  } catch (e) { showAuth('Network error: ' + e.message); }
}

function showAuth(msg) {
  if (timer) { clearInterval(timer); timer = null; }
  document.getElementById('auth').style.display = 'block';
  document.getElementById('board').style.display = 'none';
  document.getElementById('signedbar').style.display = 'none';
  document.getElementById('autherr').textContent = msg || '';
}

function useToken() {
  const v = document.getElementById('tok').value.trim();
  if (!v) return;
  auth = { kind: 'token', value: v };
  sessionStorage.setItem('bk_auth', JSON.stringify(auth));
  load();
}
function signOut() {
  auth = null; sessionStorage.removeItem('bk_auth'); showAuth('');
}
function onGoogle(resp) {
  auth = { kind: 'google', value: resp.credential };
  sessionStorage.setItem('bk_auth', JSON.stringify(auth));
  load();
}

(async function init() {
  const saved = sessionStorage.getItem('bk_auth');
  if (saved) { try { auth = JSON.parse(saved); } catch {} }
  try {
    const cfg = await (await fetch('/api/council/admin/config')).json();
    if (cfg.googleClientId) {
      const s = document.createElement('script');
      s.src = 'https://accounts.google.com/gsi/client';
      s.onload = () => {
        google.accounts.id.initialize({ client_id: cfg.googleClientId, callback: onGoogle });
        google.accounts.id.renderButton(document.getElementById('gsi'), { theme: 'filled_black', size: 'large', text: 'signin_with' });
      };
      document.head.appendChild(s);
      document.getElementById('authhint').textContent = 'Sign in with ' + cfg.ownerEmail + ', or paste the console key.';
    } else {
      document.getElementById('authhint').textContent = 'Google sign-in not configured yet (GOOGLE_CLIENT_ID unset) - use the console key.';
    }
  } catch {}
  if (auth) load();
  window.addEventListener('focus', () => { if (auth) load(); });
})();
</script>
</body>
</html>
