<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Backlog</title>
<style>
  :root { --bg:#0f1115; --card:#171a21; --ink:#e8e6e1; --dim:#9a968d; --acc:#caa46a; --ok:#7fb069; --err:#d06c5b; --line:#262a33; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.55 "Segoe UI",system-ui,sans-serif; }
  header { display:flex; align-items:center; gap:12px; padding:16px 26px; border-bottom:1px solid var(--line); }
  header h1 { font-size:17px; margin:0; font-weight:600; letter-spacing:.4px; }
  header .sub { color:var(--dim); font-size:13px; }
  header .right { margin-left:auto; display:flex; align-items:center; gap:10px; }
  main { max-width:980px; margin:0 auto; padding:24px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px 20px; margin-bottom:16px; }
  .row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  button { background:var(--acc); color:#14110a; border:0; border-radius:8px; padding:8px 15px; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; color:var(--acc); border:1px solid var(--acc); }
  input[type=password] { background:#0d0f13; border:1px solid #2c313c; border-radius:8px; color:var(--ink); padding:8px 12px; min-width:260px; }
  .meta { color:var(--dim); font-size:12.5px; }
  .msg.err { color:var(--err); font-size:13px; }
  .actor { font-weight:600; font-size:15px; letter-spacing:.3px; }
  .badge { font-size:11.5px; color:var(--dim); border:1px solid var(--line); border-radius:6px; padding:2px 8px; }
  ul { margin:8px 0 2px; padding-left:20px; }
  li { margin:3px 0; }
  li.done { color:var(--dim); }
  li.done::marker { content:"✓ "; color:var(--ok); }
  li.plan::marker { content:"› "; color:var(--acc); }
  .grouph { font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin-top:10px; }
  pre.raw { white-space:pre-wrap; font:13px/1.6 Consolas,monospace; color:var(--ink); margin:8px 0 0; }
  #board, #signedbar { display:none; }
  .hint { color:var(--dim); font-size:13px; margin-top:8px; line-height:1.6; }
  a { color:var(--acc); }
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; margin-bottom:16px; }
  .stat { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 18px; }
  .stat .k { font-size:11.5px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); }
  .stat .v { font-size:22px; font-weight:600; margin-top:6px; }
  .stat .v small { font-size:13px; font-weight:400; color:var(--dim); }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; vertical-align:middle; margin-right:6px; }
  .dot.ok { background:var(--ok); } .dot.err { background:var(--err); } .dot.dimd { background:var(--dim); }
  .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:1.2px; color:var(--dim); margin:0 0 12px; font-weight:600; }
  table { width:100%; border-collapse:collapse; font-size:13.5px; }
  th { text-align:left; color:var(--dim); font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:.6px; padding:6px 8px; border-bottom:1px solid var(--line); }
  td { padding:7px 8px; border-bottom:1px solid var(--line); vertical-align:top; }
  tr:last-child td { border-bottom:0; }
  .mono { font:12.5px/1.5 Consolas,monospace; }
  .badge.ok2 { color:var(--ok); border-color:#34492c; } .badge.no2 { color:var(--err); border-color:#4a2c28; }
  .pill { font-size:11px; border-radius:6px; padding:1px 7px; }
  .pill.live { color:var(--ok); border:1px solid #34492c; } .pill.rep { color:var(--dim); border:1px solid var(--line); }
</style>
</head>
<body>
<header>
  <h1>🏛️ Council board</h1>
  <span class="sub">live · dashboard + backlog</span>
  <span class="right">
    <span class="meta" id="refreshed"></span>
    <span id="signedbar"><button class="ghost" onclick="signOut()">Sign out</button></span>
  </span>
</header>
<main>
  <div class="card" id="auth">
    <div class="row">
      <div id="gsi"></div>
      <input type="password" id="tok" placeholder="...or console key">
      <button onclick="useToken()">Enter</button>
    </div>
    <div class="hint" id="authhint">Sign in with the owner Google account, or paste the console key.</div>
    <div class="msg err" id="autherr"></div>
  </div>
  <div id="panels"></div>
  <div id="board"></div>
</main>
<script>
let auth = null; // { kind:'google'|'token', value }
let timer = null;

function hdrs() {
  if (!auth) return {};
  return auth.kind === 'google' ? { 'x-google-id-token': auth.value } : { 'x-admin-token': auth.value };
}
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmt(ts) { return ts ? new Date(ts).toLocaleString() : '—'; }
function ago(ts) { if (!ts) return '—'; const s=(Date.now()-new Date(ts).getTime())/1000; if(s<60)return Math.round(s)+'s ago'; if(s<3600)return Math.round(s/60)+'m ago'; if(s<86400)return Math.round(s/3600)+'h ago'; return Math.round(s/86400)+'d ago'; }
function nextFire(time) { if(!/^\d\d:\d\d$/.test(time||''))return '—'; const [h,m]=time.split(':').map(Number); const now=new Date(); const t=new Date(now); t.setHours(h,m,0,0); if(t<=now)t.setDate(t.getDate()+1); return t.toLocaleString([], {weekday:'short',hour:'2-digit',minute:'2-digit'}); }
function statStrip(d) {
  const s = d.scheduler || {}; const hub = d.ok && d.vault;
  return '<div class="stats">'
    + '<div class="stat"><div class="k">Hub</div><div class="v"><span class="dot ' + (hub?'ok':'err') + '"></span>' + (hub?'Healthy':'Degraded') + ' <small>vault ' + (d.vault?'ok':'down') + '</small></div></div>'
    + '<div class="stat"><div class="k">Scheduler</div><div class="v"><span class="dot ' + (s.enabled?'ok':'dimd') + '"></span>' + (s.enabled?'On':'Off') + ' <small>@ ' + esc(s.time) + ' ET</small></div></div>'
    + '<div class="stat"><div class="k">Next meeting</div><div class="v" style="font-size:16px">' + esc(s.enabled?nextFire(s.time):'paused') + '<br><small>voice loop ' + (s.voiceLoopEnabled?'armed':'OFF') + '</small></div></div>'
    + '<div class="stat"><div class="k">Spent today</div><div class="v">$' + (Number(d.spentTodayUsd||0)).toFixed(4) + '</div></div></div>';
}
function meetingsCard(rows) {
  if (!rows || !rows.length) return '';
  const tr = rows.map(m => { const live=m.phase==='rounds'; const closed=m.closedAt?fmt(m.closedAt):(live?'<span class="pill live">live</span>':'<span class="pill rep">report</span>');
    return '<tr><td class="mono">'+esc((m.id||'').slice(0,8))+'</td><td>'+esc((m.agenda||'').slice(0,40))+'</td><td>'+esc(m.turnsUsed)+'/'+esc(m.turnCap)+'</td><td>'+(m.usd==null?'—':'$'+Number(m.usd).toFixed(4))+'</td><td>'+esc(m.endedReason||'')+'</td><td>'+closed+'</td><td class="meta">'+esc(fmt(m.createdAt))+'</td></tr>'; }).join('');
  return '<div class="card"><h2>Recent meetings</h2><table><tr><th>id</th><th>agenda</th><th>turns</th><th>cost</th><th>ended</th><th>closed</th><th>opened</th></tr>'+tr+'</table></div>';
}
function membersCard(rows) {
  if (!rows || !rows.length) return '';
  const b=(ok,l)=>'<span class="badge '+(ok?'ok2':'no2')+'">'+l+' '+(ok?'✓':'✗')+'</span>';
  const tr = rows.map(x=>'<tr><td><b>'+esc(x.actor)+'</b></td><td>'+b(x.corpusReady,'corpus')+b(x.packReady,'pack')+b(x.manifestReady,'manifest')+'</td><td class="meta">'+esc(x.corpusBuiltAt?ago(x.corpusBuiltAt):'—')+'</td></tr>').join('');
  return '<div class="card"><h2>Member brains</h2><table><tr><th>actor</th><th>artifacts</th><th>corpus built</th></tr>'+tr+'</table></div>';
}
function bootsCard(rows) {
  if (!rows || !rows.length) return '';
  const tr = rows.map(b=>'<tr><td class="mono">'+esc((b.deploy_sha||'').slice(0,7))+'</td><td class="meta">'+esc(fmt(b.booted_at))+'</td><td class="meta">fp '+(b.secret_fp?'present':'—')+'</td></tr>').join('');
  return '<div class="card"><h2>Boot log</h2><table><tr><th>deploy</th><th>booted</th><th>secret</th></tr>'+tr+'</table><div class="meta" style="margin-top:8px">two rows, same deploy = a container cycled without a deploy</div></div>';
}
function agendaCard(items) {
  const head = '<div class="card"><h2>Open agenda</h2>';
  if (!items || !items.length) return head + '<div class="meta">no open topics — queue one via POST /api/council/agenda</div></div>';
  const pri = p => '<span class="badge ' + (p==='high'?'no2':'ok2') + '">' + esc(p||'normal') + '</span>';
  const tr = items.map(it => '<tr><td>'+pri(it.priority)+'</td><td><b>'+esc(it.title)+'</b>'
    + (it.body?'<div class="meta">'+esc(String(it.body).slice(0,180))+'</div>':'')
    + '</td><td class="meta">'+esc(it.actor)+'</td><td class="meta">'+esc(ago(it.createdAt))+'</td></tr>').join('');
  return head + '<table><tr><th>pri</th><th>topic</th><th>by</th><th>queued</th></tr>'+tr+'</table></div>';
}
function managerCard(digest, flags) {
  const head = '<div class="card"><h2>Layer-1 Manager</h2>';
  let body = '';
  if (!digest) body += '<div class="meta">no meeting digest yet — generates at the next meeting close</div>';
  else {
    const b=(ok,l)=>'<span class="badge '+(ok?'ok2':'no2')+'">'+l+' '+(ok?'✓':'✗')+'</span>';
    body += '<div class="meta">meeting '+esc((digest.meetingId||'').slice(0,8))+' · '+esc(ago(digest.generatedAt))+'</div>';
    if (digest.note) body += '<pre class="raw">'+esc(digest.note)+'</pre>';
    const pa = (digest.perAgent||[]).map(a=>'<tr><td><b>'+esc(a.actor)+'</b></td><td>'+b(a.brainPaired,'paired')+b(a.participated,'spoke')+b(a.codeChanged,'shipped')+'</td></tr>').join('');
    if (pa) body += '<table><tr><th>actor</th><th>signals</th></tr>'+pa+'</table>';
  }
  if (flags && flags.length) {
    const fr = flags.map(f=>'<tr><td><b>'+esc(f.title)+'</b></td><td><span class="badge '+(f.count>=2?'no2':'ok2')+'">×'+esc(f.count)+'</span></td><td class="meta">'+(f.agendaItemId?'on agenda':'')+'</td></tr>').join('');
    body += '<div class="grouph" style="margin-top:10px">recurring flags</div><table><tr><th>flag</th><th>seen</th><th></th></tr>'+fr+'</table>';
  } else body += '<div class="meta" style="margin-top:8px">no open flags</div>';
  return head + body + '</div>';
}
async function loadPanels() {
  try {
    const r = await fetch('/api/council/dashboard', { headers: hdrs() });
    if (!r.ok) return;
    const d = await r.json();
    // Layer-1 + agenda panels pull from their own owner-gated endpoints (best-effort; never block the board).
    let agenda = [], digest = null, flags = [];
    try { const ar = await fetch('/api/council/agenda', { headers: hdrs() }); if (ar.ok) agenda = (await ar.json()).items || []; } catch {}
    try { const mr = await fetch('/api/council/manager/digests', { headers: hdrs() }); if (mr.ok) { const dd = (await mr.json()).digests || []; digest = dd[0] || null; } } catch {}
    try { const fr = await fetch('/api/council/manager/flags', { headers: hdrs() }); if (fr.ok) flags = (await fr.json()).flags || []; } catch {}
    document.getElementById('panels').innerHTML = statStrip(d) + managerCard(digest, flags) + agendaCard(agenda)
      + meetingsCard(d.meetings) + membersCard(d.members) + bootsCard(d.boots);
  } catch {}
}

function renderList(items, cls) {
  if (!items || !items.length) return '<div class="meta">none</div>';
  return '<ul>' + items.map(i => '<li class="' + cls + '">' + esc(typeof i === 'string' ? i : JSON.stringify(i)) + '</li>').join('') + '</ul>';
}

async function load() {
  loadPanels();
  try {
    const r = await fetch('/api/council/backlog', { headers: hdrs() });
    if (r.status === 401) { return showAuth('Session expired or not authorized - sign in again.'); }
    if (!r.ok) { return showAuth('Hub returned ' + r.status); }
    const d = await r.json();
    const sections = d.sections || [];
    const board = document.getElementById('board');
    if (!sections.length) { board.innerHTML = '<div class="card meta">no backlog rows yet</div>'; }
    else {
      board.innerHTML = sections.map(s => {
        const when = s.updatedAt ? new Date(s.updatedAt).toLocaleString() : '';
        let body;
        if ((s.done && s.done.length) || (s.planned && s.planned.length)) {
          body = '<div class="grouph">planned</div>' + renderList(s.planned, 'plan')
               + '<div class="grouph">done</div>' + renderList(s.done, 'done');
        } else if (s.content) {
          body = '<pre class="raw">' + esc(s.content) + '</pre>';
        } else { body = '<div class="meta">empty</div>'; }
        return '<div class="card"><div class="row" style="justify-content:space-between">'
             + '<span class="actor">' + esc(s.actor || 'unknown') + '</span>'
             + '<span class="badge">' + esc(when) + '</span></div>' + body + '</div>';
      }).join('');
    }
    document.getElementById('auth').style.display = 'none';
    document.getElementById('signedbar').style.display = 'inline';
    board.style.display = 'block';
    document.getElementById('refreshed').textContent = 'refreshed ' + new Date().toLocaleTimeString();
    if (!timer) timer = setInterval(load, 60000);
  } catch (e) { showAuth('Network error: ' + e.message); }
}

function showAuth(msg) {
  if (timer) { clearInterval(timer); timer = null; }
  document.getElementById('auth').style.display = 'block';
  document.getElementById('board').style.display = 'none';
  document.getElementById('panels').innerHTML = '';
  document.getElementById('signedbar').style.display = 'none';
  document.getElementById('autherr').textContent = msg || '';
}

function useToken() {
  const v = document.getElementById('tok').value.trim();
  if (!v) return;
  auth = { kind: 'token', value: v };
  sessionStorage.setItem('bk_auth', JSON.stringify(auth));
  load();
}
function signOut() {
  auth = null; sessionStorage.removeItem('bk_auth'); showAuth('');
}
function onGoogle(resp) {
  auth = { kind: 'google', value: resp.credential };
  sessionStorage.setItem('bk_auth', JSON.stringify(auth));
  load();
}

(async function init() {
  const saved = sessionStorage.getItem('bk_auth');
  if (saved) { try { auth = JSON.parse(saved); } catch {} }
  try {
    const cfg = await (await fetch('/api/council/admin/config')).json();
    if (cfg.googleClientId) {
      const s = document.createElement('script');
      s.src = 'https://accounts.google.com/gsi/client';
      s.onload = () => {
        google.accounts.id.initialize({ client_id: cfg.googleClientId, callback: onGoogle });
        google.accounts.id.renderButton(document.getElementById('gsi'), { theme: 'filled_black', size: 'large', text: 'signin_with' });
      };
      document.head.appendChild(s);
      document.getElementById('authhint').textContent = 'Sign in with ' + cfg.ownerEmail + ', or paste the console key.';
    } else {
      document.getElementById('authhint').textContent = 'Google sign-in not configured yet (GOOGLE_CLIENT_ID unset) - use the console key.';
    }
  } catch {}
  if (auth) load();
  window.addEventListener('focus', () => { if (auth) load(); });
})();
</script>
</body>
</html>
