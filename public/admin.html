<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arke — Super-admin</title>
<style>
  :root { --bg:#0f1115; --card:#171a21; --ink:#e8e6e1; --dim:#9a968d; --acc:#caa46a; --ok:#7fb069; --err:#d06c5b; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.55 "Segoe UI",system-ui,sans-serif; }
  header { display:flex; align-items:center; gap:12px; padding:18px 26px; border-bottom:1px solid #262a33; }
  header h1 { font-size:18px; margin:0; font-weight:600; letter-spacing:.4px; }
  header .sub { color:var(--dim); font-size:13px; }
  main { max-width:980px; margin:0 auto; padding:26px; }
  .card { background:var(--card); border:1px solid #262a33; border-radius:12px; padding:20px; margin-bottom:18px; }
  .row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  button { background:var(--acc); color:#14110a; border:0; border-radius:8px; padding:9px 16px; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; color:var(--acc); border:1px solid var(--acc); }
  button:disabled { opacity:.5; cursor:default; }
  input[type=password] { background:#0d0f13; border:1px solid #2c313c; border-radius:8px; color:var(--ink); padding:9px 12px; min-width:280px; }
  textarea { width:100%; min-height:480px; background:#0d0f13; border:1px solid #2c313c; border-radius:10px; color:var(--ink); padding:14px; font:13.5px/1.6 Consolas,monospace; resize:vertical; }
  .meta { color:var(--dim); font-size:12.5px; }
  .msg { font-size:13px; } .msg.ok { color:var(--ok); } .msg.err { color:var(--err); }
  #panel { display:none; }
  .hint { color:var(--dim); font-size:13px; margin-top:8px; }
</style>
</head>
<body>
<header>
  <h1>🏛️ Arke — Super-admin</h1>
  <span class="sub">architectscouncil.com · backlog vivant</span>
</header>
<main>
  <div class="card" id="auth">
    <div class="row">
      <div id="gsi"></div>
      <span class="meta" id="authsep"></span>
      <input type="password" id="tok" placeholder="…ou clé console (x-admin-token)">
      <button onclick="useToken()">Entrer</button>
    </div>
    <div class="hint" id="authhint"></div>
    <div class="msg err" id="autherr"></div>
  </div>

  <div id="panel">
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <strong>📋 Backlog vivant</strong>
        <span class="meta" id="meta"></span>
      </div>
      <textarea id="content" spellcheck="false"></textarea>
      <div class="row" style="margin-top:12px">
        <button onclick="save()">Sauvegarder</button>
        <button class="ghost" onclick="load()">Recharger</button>
        <span class="msg" id="msg"></span>
      </div>
      <div class="hint">Source canonique du backlog d'Arke. Chaque session de travail le lit au démarrage et le met à jour; le rituel de fermeture (02:00) le synchronise.</div>
    </div>
  </div>
</main>
<script>
let H = {}; // auth headers
const $ = (id) => document.getElementById(id);
async function cfg() {
  const r = await fetch('/api/council/admin/config'); const d = await r.json();
  if (d.googleClientId) {
    const s = document.createElement('script'); s.src = 'https://accounts.google.com/gsi/client'; s.async = true;
    s.onload = () => {
      google.accounts.id.initialize({ client_id: d.googleClientId, callback: (resp) => {
        H = { 'x-google-id-token': resp.credential }; enter();
      }});
      google.accounts.id.renderButton($('gsi'), { theme: 'filled_black', text: 'signin_with' });
    };
    document.head.appendChild(s);
    $('authsep').textContent = 'ou';
    $('authhint').textContent = 'Connexion Google: ' + d.ownerEmail + ' uniquement.';
  } else {
    $('authhint').textContent = 'Google Sign-In non configuré (GOOGLE_CLIENT_ID manquant sur Railway) — utilise la clé console en attendant.';
  }
}
function useToken() { const t = $('tok').value.trim(); if (!t) return; H = { 'x-admin-token': t }; enter(); }
async function enter() {
  const r = await fetch('/api/council/admin/backlog', { headers: H });
  if (!r.ok) { $('autherr').textContent = 'Accès refusé.'; return; }
  $('auth').style.display = 'none'; $('panel').style.display = 'block';
  render(await r.json());
}
function render(d) {
  $('content').value = d.content || '';
  $('meta').textContent = d.updatedAt ? ('maj ' + d.updatedAt + (d.updatedBy ? ' par ' + d.updatedBy : '')) : 'vide';
}
async function load() { const r = await fetch('/api/council/admin/backlog', { headers: H }); if (r.ok) { render(await r.json()); flash('rechargé', true); } }
async function save() {
  const r = await fetch('/api/council/admin/backlog', { method: 'POST',
    headers: { ...H, 'content-type': 'application/json' },
    body: JSON.stringify({ content: $('content').value, updatedBy: 'Mathieu (admin)' }) });
  const d = await r.json();
  if (d.ok) { $('meta').textContent = 'maj ' + d.updatedAt + ' par Mathieu (admin)'; flash('sauvegardé ✓', true); }
  else flash(d.error || 'erreur', false);
}
function flash(t, ok) { const m = $('msg'); m.textContent = t; m.className = 'msg ' + (ok ? 'ok' : 'err'); setTimeout(() => m.textContent = '', 4000); }
cfg();
</script>
</body>
</html>
