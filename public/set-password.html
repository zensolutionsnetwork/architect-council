<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Set your owner password — Architects Council</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; max-width: 460px; margin: 8vh auto; padding: 0 20px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.sub { color: #777; margin: 0 0 20px; }
  label { display:block; font-weight:600; margin: 14px 0 4px; }
  input[type=password] { width:100%; box-sizing:border-box; padding:10px; font-size:15px; border:1px solid #999; border-radius:8px; }
  button { margin-top:18px; width:100%; padding:11px; font-size:15px; font-weight:600; border:0; border-radius:8px; background:#2a7; color:#fff; cursor:pointer; }
  button:disabled { background:#9c8; cursor:not-allowed; }
  .msg { margin-top:16px; padding:11px 13px; border-radius:8px; font-size:14px; display:none; }
  .err { background:#fde7e7; color:#902; }
  .ok { background:#e3f7e3; color:#060; }
  .hint { color:#999; font-size:13px; margin-top:6px; }
</style>
</head>
<body>
  <h1>Set your owner password</h1>
  <p class="sub">Architects Council — owner access</p>
  <label for="pw">New password</label>
  <input id="pw" type="password" autocomplete="new-password" placeholder="at least 12 characters">
  <label for="pw2">Confirm password</label>
  <input id="pw2" type="password" autocomplete="new-password" placeholder="re-enter password">
  <div class="hint">Minimum 12 characters. This one-time link expires 15 minutes after the email was sent.</div>
  <button id="go">Set password</button>
  <div id="msg" class="msg"></div>
<script src="/set-password.js"></script>
</body>
</html>
